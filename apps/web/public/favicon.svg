<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Crossword Battle">
  <!-- Brand Mark (cf. components/Brand.tsx): press-cream tile, the 3x3 crossword
       glyph with four ink cells and one Spotlight Coral cell (bottom-left). Colors
       are the DEFAULT_BRAND values; favicons are static so they can't read the
       white-label accent at runtime. -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="#F5F2EA" stroke="#1F1B19" stroke-opacity="0.15"/>
  <rect x="5"  y="5"  width="6" height="6" rx="1.3" fill="#1F1B19"/>
  <rect x="21" y="5"  width="6" height="6" rx="1.3" fill="#1F1B19"/>
  <rect x="13" y="13" width="6" height="6" rx="1.3" fill="#1F1B19"/>
  <rect x="21" y="21" width="6" height="6" rx="1.3" fill="#1F1B19"/>
  <rect x="5"  y="21" width="6" height="6" rx="1.3" fill="#FE414D"/>
</svg>
